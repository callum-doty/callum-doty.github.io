<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrolling Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .moving-element {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            color: #fff;
            text-align: center;
            line-height: 100px;
            font-size: 1.2em;
            position: relative;
            top: 0;
            transition: top 0.5s ease-in-out;
        }
    </style>
    <body>

        <div class="moving-element">Scroll Down</div>

        <div style="height: 1000px; background-color: #ecf0f1; padding: 20px;">
        <!-- Content to create space for scrolling -->
        </div>

        <script>
          window.addEventListener('scroll', function() {
            var element = document.querySelector('.moving-element');
            var scrollTop = window.scrollY;

            // Adjust the 'top' property based on scroll position
            element.style.top = scrollTop + 'px';
        });
    </script>

</body>
</html>
